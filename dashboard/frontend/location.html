<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>

        Laptop Location

    </title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->

        <aside class="sidebar">

            <div class="logo">

                <i class="fa-solid fa-shield-halved"></i>

                <h2>

                    SecureWatch

                </h2>

            </div>

            <nav>

                <a href="/">

                    🏠 Dashboard

                </a>

                <a href="/evidence">

                    📂 Evidence

                </a>

                <a class="active" href="/location">

                    📍 Location

                </a>

                <a href="/settings">

                    ⚙ Settings

                </a>

            </nav>

        </aside>

        <!-- Main -->

        <main class="main">

            <div class="page-title">

                <h1>

                    📍 Laptop Location

                </h1>

                <p>

                    Live GPS and Network Location

                </p>

            </div>

            <div class="dashboard-row">

                <div class="glass-card">

                    <h2>

                        🗺 Live Map

                    </h2>

                    <iframe id="map" width="100%" height="500" frameborder="0" style="border-radius:18px;">

                    </iframe>

                </div>

                <div class="glass-card">

                    <h2>

                        📡 Device Location

                    </h2>

                    <div class="device-grid">

                        <div class="device-item">

                            <span>

                                Latitude

                            </span>

                            <strong id="latitude">

                                --

                            </strong>

                        </div>

                        <div class="device-item">

                            <span>

                                Longitude

                            </span>

                            <strong id="longitude">

                                --

                            </strong>

                        </div>

                        <div class="device-item">

                            <span>

                                City

                            </span>

                            <strong id="city">

                                --

                            </strong>

                        </div>

                        <div class="device-item">

                            <span>

                                Country

                            </span>

                            <strong id="country">

                                --

                            </strong>

                        </div>

                        <div class="device-item">

                            <span>

                                Accuracy

                            </span>

                            <strong id="accuracy">

                                --

                            </strong>

                        </div>

                        <div class="device-item">

                            <span>

                                Last Update

                            </span>

                            <strong id="lastUpdate">

                                --

                            </strong>

                        </div>

                    </div>

                    <br>

                    <button class="primary-btn" onclick="refreshLocation()">

                        Refresh Location

                    </button>

                    <button class="secondary-btn" onclick="navigateLocation()">

                        Navigate

                    </button>

                </div>

            </div>

        </main>

    </div>

    <script src="/utils.js"></script>

    <script src="/notification.js"></script>

    <script src="/location.js"></script>

</body>

</html>
